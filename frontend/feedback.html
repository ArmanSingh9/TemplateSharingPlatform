<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback | TemplateHub</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>

    <nav class="floating-nav fade-up" style="animation-delay: 0.1s;">
        <a href="/" class="nav-brand">
            <i class="ph ph-squares-four text-white"></i>
        </a>
        <div class="nav-links">
            <a href="/" class="nav-link">
                <i class="ph ph-house"></i> Home
            </a>
            <a href="/explore.html" class="nav-link">
                <i class="ph ph-magnifying-glass"></i> Explore
            </a>
            <a href="/upload.html" class="nav-link">
                <i class="ph ph-cloud-arrow-up"></i> Upload
            </a>
            <a href="/about.html" class="nav-link">
                <i class="ph ph-info"></i> About
            </a>
        </div>
    </nav>

    <main class="container fade-up" style="animation-delay: 0.2s; max-width: 800px; padding-top: 150px;">
        <div class="glass-panel" style="padding: 60px; border-radius: 40px; text-align: center;">
            <div style="width: 80px; height: 80px; background: var(--brand-pink); color: white; border-radius: 25px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; margin: 0 auto 30px auto; box-shadow: 0 10px 30px rgba(244, 63, 94, 0.3);">
                <i class="ph-bold ph-chat-centered-text"></i>
            </div>
            
            <h1 style="font-size: 3rem; font-weight: 800; letter-spacing: -1.5px; margin-bottom: 10px;">Send Feedback</h1>
            <p style="color: rgba(15, 23, 42, 0.5); font-weight: 600; margin-bottom: 40px; font-size: 1.1rem;">Found a glitch or have a brilliant idea? Let us know.</p>

            <form id="feedbackForm" style="text-align: left;">
                <div style="margin-bottom: 20px;">
                    <label style="font-weight: 800; color: rgba(15, 23, 42, 0.6); display: block; margin-bottom: 10px; margin-left: 5px;">Your Name</label>
                    <input type="text" style="width: 100%; padding: 18px 25px; border-radius: 20px; border: 2px solid transparent; font-size: 1rem; font-weight: 600; background: rgba(255,255,255,0.8); outline: none; transition: 0.3s;" placeholder="John Doe" required>
                </div>
                <div style="margin-bottom: 20px;">
                    <label style="font-weight: 800; color: rgba(15, 23, 42, 0.6); display: block; margin-bottom: 10px; margin-left: 5px;">Email Address</label>
                    <input type="email" style="width: 100%; padding: 18px 25px; border-radius: 20px; border: 2px solid transparent; font-size: 1rem; font-weight: 600; background: rgba(255,255,255,0.8); outline: none; transition: 0.3s;" placeholder="hello@example.com" required>
                </div>
                <div style="margin-bottom: 30px;">
                    <label style="font-weight: 800; color: rgba(15, 23, 42, 0.6); display: block; margin-bottom: 10px; margin-left: 5px;">Message</label>
                    <textarea rows="5" style="width: 100%; padding: 18px 25px; border-radius: 20px; border: 2px solid transparent; font-size: 1rem; font-weight: 600; background: rgba(255,255,255,0.8); outline: none; transition: 0.3s; resize: vertical;" placeholder="Describe the issue or feature request..." required></textarea>
                </div>

                <button type="submit" class="btn-bouncy" style="width: 100%; padding: 20px; border-radius: 999px; background: var(--brand-dark); color: white; border: none; font-weight: 800; font-size: 1.2rem; cursor: pointer; box-shadow: var(--shadow-premium);">Send Message</button>
            </form>
        </div>
    </main>

    <script src="/js/main.js"></script>
    <script src="/js/footer-loader.js"></script>
    <script>
        document.getElementById('feedbackForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;
            btn.innerHTML = '<div class="spinner" style="width:20px;height:20px;border-width:3px;margin: 0 auto;border-top-color: white; border-color: rgba(255,255,255,0.3)"></div>';
            
            // Simulate API call
            setTimeout(() => {
                btn.innerText = originalText;
                e.target.reset();
                window.showToast("Feedback sent! Thank you.", "success");
            }, 1000);
        });

        // Add focus effects to inputs
        document.querySelectorAll('input, textarea').forEach(el => {
            el.addEventListener('focus', () => { el.style.background = 'white'; el.style.borderColor = 'var(--brand-purple)'; el.style.boxShadow = '0 0 0 8px rgba(139, 92, 246, 0.1)'; });
            el.addEventListener('blur', () => { el.style.background = 'rgba(255,255,255,0.8)'; el.style.borderColor = 'transparent'; el.style.boxShadow = 'none'; });
        });
    </script>
</body>
</html>
