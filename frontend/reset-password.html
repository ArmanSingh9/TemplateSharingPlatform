<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | TemplateHub</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body {
            background: var(--mesh-gradient);
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container { width: 100%; max-width: 500px; }
        .auth-card { padding: 60px 50px; border-radius: 40px; text-align: center; }
        
        .auth-icon {
            width: 100px; height: 100px; background: white; color: var(--brand-purple);
            border-radius: 35px; display: flex; align-items: center; justify-content: center;
            font-size: 3rem; margin: 0 auto 30px auto; box-shadow: var(--shadow-premium);
            transform: rotate(-5deg);
        }

        .input-group { position: relative; margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-weight: 800; font-size: 0.9rem; margin-bottom: 8px; margin-left: 5px; color: rgba(15, 23, 42, 0.6); }
        .auth-input {
            width: 100%; padding: 18px 25px; border-radius: 20px; border: 2px solid transparent;
            font-size: 1rem; font-weight: 600; background: rgba(255,255,255,0.8);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); outline: none; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }
        .auth-input:focus { border-color: var(--brand-purple); background: white; box-shadow: 0 0 0 8px rgba(139, 92, 246, 0.1); transform: translateY(-2px); }
        .auth-btn {
            width: 100%; padding: 20px; border-radius: 999px; border: none; background: var(--brand-dark);
            color: white; font-weight: 800; font-size: 1.2rem; cursor: pointer; box-shadow: var(--shadow-premium); margin-top: 10px;
        }
        .auth-link { display: block; margin-top: 30px; font-weight: 700; color: rgba(15, 23, 42, 0.5); text-decoration: none; transition: 0.2s; }
        .auth-link:hover { color: var(--brand-purple); }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card glass-panel fade-up">
            <div class="auth-icon">
                <i class="ph-fill ph-password"></i>
            </div>
            
            <h1 style="font-weight: 700; font-size: 2.5rem; margin-bottom: 15px; letter-spacing: -1.5px;">New Password</h1>
            <p style="color: rgba(15, 23, 42, 0.6); font-weight: 600; margin-bottom: 30px;">Create a strong, new password for your account.</p>

            <form id="resetForm">
                <div class="input-group">
                    <label>New Password</label>
                    <input type="password" class="auth-input" id="passwordInput" placeholder="••••••••" required minlength="6">
                </div>
                <div class="input-group">
                    <label>Confirm Password</label>
                    <input type="password" class="auth-input" id="confirmPasswordInput" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="auth-btn btn-bouncy" id="resetBtn">Change Password</button>
            </form>
        </div>
    </div>

    <script src="/js/main.js"></script>
    <script>
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('passwordInput').value;
            const confirmPassword = document.getElementById('confirmPasswordInput').value;
            const btn = document.getElementById('resetBtn');
            
            if (password !== confirmPassword) {
                showToast('Passwords do not match!', 'error');
                return;
            }

            // Get token from URL
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            if (!token) {
                showToast('Invalid or missing reset token. Please request a new one.', 'error');
                return;
            }

            btn.innerHTML = '<div class="spinner" style="width:20px;height:20px;border-width:3px;margin: 0 auto;"></div>';
            
            try {
                const res = await fetch(`/api/auth/resetpassword/${token}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    showToast('Password changed successfully!', 'success');
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 2000);
                } else {
                    showToast(data.message || 'Error resetting password', 'error');
                }
            } catch (err) {
                showToast('Network error', 'error');
            } finally {
                btn.innerHTML = 'Change Password';
            }
        });
    </script>
</body>
</html>
