<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Studio | TemplateHub</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>

    <nav class="floating-nav fade-up" style="animation-delay: 0.1s;">
        <a href="/" class="nav-brand">
            <i class="ph ph-squares-four text-white"></i>
        </a>
        <div class="nav-links">
            <a href="/" class="nav-link">
                <i class="ph ph-house"></i> Home
            </a>
            <a href="/explore.html" class="nav-link">
                <i class="ph ph-magnifying-glass"></i> Explore
            </a>
            <a href="/upload.html" class="nav-link">
                <i class="ph ph-cloud-arrow-up"></i> Upload
            </a>
            <a href="/admin.html" class="nav-link active">
                <i class="ph ph-user-circle"></i> Profile
            </a>
        </div>
    </nav>

    <div class="explore-hero fade-up" style="animation-delay: 0.2s;">
        <div>
            <h1 style="font-size:4rem; font-family: 'Fredoka', sans-serif; letter-spacing: -3px;">Creator Studio</h1>
        </div>
        <button class="btn-bouncy" style="border:none; background:rgba(244,63,94,0.1); color:#F43F5E; font-weight:700; padding:15px 25px; border-radius:999px; cursor:pointer">
            <i class="ph ph-sign-out"></i> Log Out
        </button>
    </div>

    <!-- Exact layout from the React Profile Screenshot -->
    <div class="dashboard-container container fade-up" style="animation-delay: 0.3s;">
        <!-- Sidebar -->
        <div class="dashboard-sidebar glass-panel">
            <div class="user-profile">
                <div class="avatar">👨‍💻</div>
                <div>
                    <div style="font-weight:900; font-size:1.1rem">Demo User</div>
                    <div style="color:gray; font-size:0.8rem; font-weight:700">Pro Creator</div>
                </div>
            </div>
            
            <a href="#" class="side-link active"><i class="ph ph-squares-four mr-2"></i> Overview</a>
            <a href="#" class="side-link"><i class="ph ph-file-text mr-2"></i> My Templates</a>
            <a href="#" class="side-link"><i class="ph ph-gear mr-2"></i> Settings</a>
        </div>

        <!-- Content -->
        <div class="dashboard-content">
            <div class="dashboard-stats">
                <div class="stat-card glass-panel">
                    <div style="color: #F43F5E; margin-bottom:10px"><i class="ph-fill ph-circle"></i></div>
                    <div class="stat-val">4</div>
                    <div class="stat-label">Templates Shared</div>
                </div>
                <div class="stat-card glass-panel">
                    <div style="color: #10B981; margin-bottom:10px"><i class="ph-fill ph-circle"></i></div>
                    <div class="stat-val">1289</div>
                    <div class="stat-label">Total Downloads</div>
                </div>
                <div class="stat-card glass-panel">
                    <div style="color: #FACC15; margin-bottom:10px"><i class="ph-fill ph-circle"></i></div>
                    <div class="stat-val">4.9</div>
                    <div class="stat-label">Avg Rating</div>
                </div>
            </div>

            <div class="glass-panel" style="padding: 40px; border-radius: 40px;">
                <h2 style="font-weight:700; font-size: 2rem; margin-bottom: 25px;">Recent Uploads</h2>
                
                <div style="display:flex; justify-content:space-between; align-items:center; border: 4px solid rgba(0,0,0,0.05); padding: 15px; border-radius: 20px; margin-bottom:10px;">
                    <div style="display:flex; align-items:center; gap: 15px; font-weight:800; font-size: 0.9rem;">
                        <div style="background: rgba(0,0,0,0.05); width: 40px; height: 40px; border-radius: 10px; display:flex; align-items:center; justify-content:center;">📄</div>
                        Animated Next.js Portfolio
                    </div>
                    <div style="font-size:0.9rem; font-weight:800; color:rgba(0,0,0,0.5)">240 downloads</div>
                </div>
                
                <div style="display:flex; justify-content:space-between; align-items:center; border: 4px solid rgba(0,0,0,0.05); padding: 15px; border-radius: 20px;">
                    <div style="display:flex; align-items:center; gap: 15px; font-weight:800; font-size: 0.9rem;">
                        <div style="background: rgba(0,0,0,0.05); width: 40px; height: 40px; border-radius: 10px; display:flex; align-items:center; justify-content:center;">📄</div>
                        E-Commerce Dashboard
                    </div>
                    <div style="font-size:0.9rem; font-weight:800; color:rgba(0,0,0,0.5)">185 downloads</div>
                </div>
            </div>
        </div>
    </div>
    <script src="/js/main.js"></script>
    <script type="module" src="/js/admin.js"></script>
</body>
</html>
