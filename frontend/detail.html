</head>
<body>

<!-- NAVBAR -->
<nav class="main-nav">
  <div class="nav-inner">
    <a href="/" class="nav-logo">
      <div class="nav-logo-icon"><i class="ph-bold ph-squares-four"></i></div>
      TemplateHub

    <div class="nav-search">
      <i class="ph ph-magnifying-glass nav-search-icon"></i>

    <div class="nav-links" id="navLinks">

      <a href="/explore.html" class="nav-link active"><i class="ph ph-compass"></i> Explore</a>
      <a href="/upload.html" class="nav-link"><i class="ph ph-upload-simple"></i> Upload</a>
      <a href="/admin.html" class="nav-link" id="profileNavLink"><i class="ph ph-user-circle"></i> Profile</a>
    </div>
    <div class="nav-actions">
      <a href="/login.html" class="btn-nav-ghost" id="loginNavBtn">Sign In</a>
      <a href="/register.html" class="btn-nav-primary" id="signupNavBtn">Sign Up Free</a>
    </div>
  </div>
</nav>

<!-- BREADCRUMB -->
<div class="page-body" style="padding-top: 80px;">
  <div style="max-width:1100px; margin:0 auto; padding: 0 24px 16px;">
    <nav style="font-size:0.8rem; font-weight:600; color:var(--brand-gray-500); display:flex; gap:6px; align-items:center;">
      <a href="/" style="color:var(--brand-gray-500);">Home</a>
      <i class="ph ph-caret-right" style="font-size:0.75rem;"></i>
      <a href="/explore.html" style="color:var(--brand-gray-500);">Explore</a>

      <span id="breadcrumbTitle" style="color:var(--brand-gray-900);">Loading...</span>
    </nav>
  </div>

  <div class="detail-layout fade-up" id="detailContainer">
    <div class="skeleton" style="aspect-ratio:4/3; border-radius:20px;"></div>
    <div>
      <div class="skeleton" style="height:200px; border-radius:16px;"></div>
    </div>
  </div>

  <!-- RELATED SECTION -->
  <div class="section" id="relatedSection" style="display:none;">
    <div class="section-header">
      <div>
        <div class="section-title">More Like This</div>
        <div class="section-subtitle">You might also enjoy these</div>
      </div>
    </div>
    <div class="gallery-grid" id="relatedGrid"></div>

<script src="/js/main.js"></script>
