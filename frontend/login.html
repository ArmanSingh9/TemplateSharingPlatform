<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | TemplateHub</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
<div class="auth-wrapper">
  <div style="width:100%; max-width:440px;">
    
    <!-- Logo -->
    <a href="/" style="display:flex; align-items:center; gap:10px; justify-content:center; margin-bottom:32px; text-decoration:none;">
      <div class="nav-logo-icon"><i class="ph-bold ph-squares-four"></i></div>
      <span style="font-size:1.2rem; font-weight:800; color:var(--brand-dark); font-family:'Plus Jakarta Sans',sans-serif;">TemplateHub</span>
    </a>

    <div class="auth-card">
      <h1>Welcome back</h1>
      <p class="auth-sub">Sign in to your account to continue</p>

      <!-- Social Logins -->
      <button class="social-btn btn-bouncy" id="googleSignInBtn">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" width="18" alt="Google">
        Continue with Google
      </button>
      <button class="social-btn btn-bouncy" id="appleSignInBtn" style="margin-bottom:0">
        <i class="ph-fill ph-apple-logo" style="font-size:1.1rem;"></i>
        Continue with Apple
      </button>

      <div class="auth-divider">or</div>

      <!-- Email Form -->
      <form id="loginForm">
        <div class="input-group">
          <label>Email Address</label>
          <input type="email" class="auth-input" name="email" placeholder="hello@example.com" required>
        </div>
        <div class="input-group">
          <label style="display:flex; justify-content:space-between; align-items:center;">
            Password
            <a href="/forgot-password.html" style="font-size:0.78rem; color:var(--brand-purple); font-weight:600; text-transform:none;">Forgot password?</a>
          </label>
          <input type="password" class="auth-input" name="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="auth-btn btn-bouncy" id="loginBtn">Sign In</button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="/register.html">Sign up free</a>
      </div>
    </div>
  </div>
</div>
<script src="/js/main.js"></script>
<script type="module" src="/js/auth.js"></script>
<script>
  // OAuth info modal
  function showOAuthInfo(provider) {
      const overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99999;display:flex;align-items:center;justify-content:center;padding:24px;';
      overlay.innerHTML = `
        <div style="background:white;border-radius:16px;padding:40px;max-width:420px;width:100%;text-align:center;box-shadow:0 25px 50px rgba(0,0,0,0.2);">
          <div style="width:56px;height:56px;background:#FEF3C7;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:1.5rem;">⚙️</div>
          <h3 style="font-size:1.2rem;font-weight:800;margin-bottom:8px;color:#111827;">${provider} Sign-In Setup Required</h3>
          <p style="font-size:0.875rem;color:#6B7280;line-height:1.6;margin-bottom:24px;">
            To enable <strong>${provider} Sign-In</strong>, you need to register this app on the 
            <strong>${provider === 'Google' ? 'Google Cloud Console' : 'Apple Developer Portal'}</strong> 
            and get an OAuth Client ID. The backend endpoint is already ready — just plug in your keys!
          </p>
          <p style="font-size:0.8rem;font-weight:700;color:#8B5CF6;margin-bottom:20px;">For now, please use Email + Password to sign in.</p>
          <button onclick="this.closest('div').parentElement.remove()" style="padding:10px 28px;background:#111827;color:white;border:none;border-radius:8px;font-weight:700;font-size:0.875rem;cursor:pointer;font-family:Inter,sans-serif;">Got it</button>
        </div>
      `;
      document.body.appendChild(overlay);
      overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
  }

  document.getElementById('googleSignInBtn').onclick = () => showOAuthInfo('Google');
  document.getElementById('appleSignInBtn').onclick = () => showOAuthInfo('Apple');
</script>
</body>
</html>
