<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | TemplateHub</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
<body>
<div class="auth-wrapper">
  <div style="width:100%; max-width:440px;">
    
    <!-- Logo -->
    <a href="/" style="display:flex; align-items:center; gap:10px; justify-content:center; margin-bottom:32px; text-decoration:none;">
      <div class="nav-logo-icon"><i class="ph-bold ph-squares-four"></i></div>
      <span style="font-size:1.2rem; font-weight:800; color:var(--brand-dark); font-family:'Plus Jakarta Sans',sans-serif;">TemplateHub</span>
    </a>

    <div class="auth-card">
      <h1>Welcome back</h1>
      <p class="auth-sub">Sign in to your account to continue</p>

      <!-- Social Logins -->
      <div id="g_id_onload"
           data-client_id="4251349550-iqadjqu6oepbnlbu866gm1kpleu8glkb.apps.googleusercontent.com"
           data-context="signin"
           data-ux_mode="popup"
           data-callback="handleGoogleLogin"
           data-auto_prompt="false">
      </div>
      <div class="g_id_signin"
           data-type="standard"
           data-shape="rectangular"
           data-theme="outline"
           data-text="continue_with"
           data-size="large"
           data-logo_alignment="center"
           style="width:100%; display:flex; justify-content:center; margin-bottom:12px;">
      </div>

      <div class="auth-divider">or</div>

      <!-- Email Form -->
      <form id="loginForm">
        <div class="input-group">
          <label>Email Address</label>
          <input type="email" class="auth-input" name="email" placeholder="hello@example.com" required>
        </div>
        <div class="input-group">
          <label style="display:flex; justify-content:space-between; align-items:center;">
            Password
            <a href="/forgot-password.html" style="font-size:0.78rem; color:var(--brand-purple); font-weight:600; text-transform:none;">Forgot password?</a>
          </label>
          <input type="password" class="auth-input" name="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="auth-btn btn-bouncy" id="loginBtn">Sign In</button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="/register.html">Sign up free</a>
      </div>
    </div>
  </div>
</div>
<script src="/js/main.js"></script>
<script type="module" src="/js/auth.js"></script>
</body>
</html>
